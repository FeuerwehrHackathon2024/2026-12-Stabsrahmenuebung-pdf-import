# Required env vars (set via shell or .env on the host):
#   IMAGE   - fully qualified image ref, ideally pinned by digest
#             e.g. ghcr.io/owner/repo@sha256:<digest>
#   DOMAIN  - public hostname Traefik should route, e.g. sim.example.org

services:
  alarmschreiben-parser:
    image: ${IMAGE:?IMAGE must be set}
    restart: unless-stopped
    networks:
      - reverseproxy
    environment:
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME:-}
      OPENAI_USER: ${OPENAI_USER:-}
      OPENAI_PASS: ${OPENAI_PASS:-}
    labels:
      traefik.enable: "true"
      traefik.docker.network: "reverseproxy"
      traefik.http.routers.alarmschreiben-parser.rule: "Host(`${DOMAIN:?DOMAIN must be set}`)"
      traefik.http.routers.alarmschreiben-parser.entrypoints: "websecure"
      traefik.http.routers.alarmschreiben-parser.tls.certresolver: "le"
      traefik.http.routers.alarmschreiben-parser.middlewares: "alarmschreiben-parser-cors"
      traefik.http.services.alarmschreiben-parser.loadbalancer.server.port: "3000"
      traefik.http.services.alarmschreiben-parser.loadbalancer.serversTransport: "alarmschreiben-parser-transport"
      traefik.http.serversTransports.alarmschreiben-parser-transport.forwardingTimeouts.responseHeaderTimeout: "5m"
      traefik.http.serversTransports.alarmschreiben-parser-transport.forwardingTimeouts.idleConnTimeout: "5m"
      traefik.http.middlewares.alarmschreiben-parser-cors.headers.accesscontrolalloworiginlist: "${CORS_ALLOWED_ORIGINS:-*}"
      traefik.http.middlewares.alarmschreiben-parser-cors.headers.accesscontrolallowmethods: "POST,OPTIONS"
      traefik.http.middlewares.alarmschreiben-parser-cors.headers.accesscontrolallowheaders: "Content-Type,Authorization"
      traefik.http.middlewares.alarmschreiben-parser-cors.headers.accesscontrolmaxage: "3600"
      traefik.http.middlewares.alarmschreiben-parser-cors.headers.addvaryheader: "true"

networks:
  reverseproxy:
    external: true
